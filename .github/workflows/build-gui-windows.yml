name: Build GUI Windows

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows GUI
    runs-on: windows-latest
    env:
      GOWORK: off  # Disable go.work (GUI is independent module)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows GUI (HTTP Server with embedded web UI)
        working-directory: gui
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o NimbusBackup.exe .

      - name: Test binary exists
        working-directory: gui
        run: |
          if (Test-Path NimbusBackup.exe) {
            Write-Output "✅ Nimbus Backup created (HTTP server, NO GPU/WebView2 required)"
            Copy-Item NimbusBackup.exe ../NimbusBackup.exe
            Get-Item ../NimbusBackup.exe | Format-List
          } else {
            Write-Error "❌ Binary not found"
            Get-ChildItem -Recurse
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-backup-windows
          path: NimbusBackup.exe
          retention-days: 30

      - name: Create ZIP package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Clean and create fresh dist directory
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Path dist | Out-Null

          # Copy GUI binary and docs
          Copy-Item NimbusBackup.exe dist/
          Copy-Item GUI_README.md dist/README.md -ErrorAction SilentlyContinue
          Copy-Item CONFIG_FORMAT_SPEC.md dist/ -ErrorAction SilentlyContinue

          # Create ZIP
          Compress-Archive -Path dist/* -DestinationPath NimbusBackup-Windows.zip -Force

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NimbusBackup-Windows.zip
